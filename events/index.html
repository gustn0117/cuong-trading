<!DOCTYPE html>
<html lang="en" data-theme="light" data-lang="en">
<head>
    <script>(function(){if(!localStorage.getItem('lang_default_v2')){localStorage.setItem('lang','en');localStorage.setItem('lang_default_v2','1');}var l=localStorage.getItem('lang')||'en';document.documentElement.setAttribute('data-lang',l);var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Cuong Trading</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="mask-icon" href="/favicon.svg" color="#f7931a">
    <meta name="theme-color" content="#f7931a">
    <link rel="stylesheet" href="../style.css?v=52">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .events-page { padding: 56px 0 80px; }
        .events-hero {
            text-align: center;
            margin-bottom: 48px;
        }
        .events-hero h1 {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-bottom: 12px;
        }
        .events-hero p {
            color: var(--text-secondary);
            font-size: 16px;
            max-width: 560px;
            margin: 0 auto;
        }
        .events-page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .events-empty {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
            border: 1px dashed var(--border);
            border-radius: 20px;
        }
        .events-empty i { font-size: 48px; color: var(--text-dim); margin-bottom: 16px; display: block; }
        .events-empty p { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
        .events-empty span { font-size: 14px; color: var(--text-muted); }
        @media (max-width: 768px) {
            .events-hero h1 { font-size: 30px; }
            .events-hero p { font-size: 14px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-inner">
            <a href="/" class="logo">Cuong Trading</a>
            <nav class="nav" id="mainNav">
                <a href="/" class="nav-link"><span class="lang-ko-inline">홈</span><span class="lang-en-inline">Home</span><span class="lang-zh-inline">首页</span></a>
                <a href="/events/" class="nav-link active"><span class="lang-ko-inline">이벤트</span><span class="lang-en-inline">Events</span><span class="lang-zh-inline">活动</span></a>
                <a href="https://t.me/cuongmanager" target="_blank" class="nav-link"><span class="lang-ko-inline">문의</span><span class="lang-en-inline">Contact</span><span class="lang-zh-inline">联系</span></a>
            </nav>
            <div class="header-controls">
                <button class="mobile-menu-btn" id="mobileMenuBtn" title="메뉴"><i class="fas fa-bars"></i></button>
                <button class="theme-toggle" id="themeToggle" title="다크모드"><i class="fas fa-moon"></i></button>
                <div class="lang-select">
                    <button class="lang-btn" id="langBtn"><i class="fas fa-globe"></i> <span id="langLabel">English</span></button>
                    <div class="lang-dropdown" id="langDropdown">
                        <button data-lang="ko">한국어</button>
                        <button data-lang="en" class="active">English</button>
                        <button data-lang="zh">中文</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container events-page">
        <section class="events-hero">
            <div class="glow-badge" style="margin:0 auto 20px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:14px;height:14px"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 17 7 17 7"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                EVENTS
            </div>
            <h1><span class="lang-ko-inline">이벤트</span><span class="lang-en-inline">Events</span><span class="lang-zh-inline">活动</span></h1>
            <p><span class="lang-ko-inline">진행중인 트레이딩 이벤트에 참여하고 보상을 받아보세요</span><span class="lang-en-inline">Join ongoing trading events and earn rewards</span><span class="lang-zh-inline">参与进行中的交易活动，赢取奖励</span></p>
        </section>

        <div class="event-grid events-page-grid" id="eventsContainer">
            <div class="events-empty">
                <i class="fas fa-circle-notch fa-spin"></i>
                <p><span class="lang-ko-inline">불러오는 중...</span><span class="lang-en-inline">Loading...</span><span class="lang-zh-inline">加载中...</span></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Cuong Trading. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://api.hsweb.pics';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjQxNzY5MjAwLCJleHAiOjE3OTk1MzU2MDB9.pei5Gx1wqEkbcDs1CiHFuTWNuVRlcrG5dPmYdrAqDdY';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, { db: { schema: 'cuong_trading' } });

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        themeToggle.innerHTML = savedTheme === 'light' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        themeToggle.addEventListener('click', () => {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            themeToggle.innerHTML = next === 'light' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        });

        // Language
        const langBtn = document.getElementById('langBtn');
        const langDropdown = document.getElementById('langDropdown');
        const langLabel = document.getElementById('langLabel');
        const langNames = { ko: '한국어', en: 'English', zh: '中文' };
        const curLang = localStorage.getItem('lang') || 'en';
        langLabel.textContent = langNames[curLang];
        document.documentElement.setAttribute('data-lang', curLang);
        document.querySelectorAll('#langDropdown button').forEach(b => b.classList.toggle('active', b.dataset.lang === curLang));
        langBtn.addEventListener('click', e => { e.stopPropagation(); langDropdown.classList.toggle('show'); });
        document.querySelectorAll('#langDropdown button').forEach(b => {
            b.addEventListener('click', () => {
                localStorage.setItem('lang', b.dataset.lang);
                location.reload();
            });
        });
        document.addEventListener('click', () => langDropdown.classList.remove('show'));

        // Mobile menu
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('mainNav').classList.toggle('open');
        });

        // Load events
        function escape(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        async function loadEvents() {
            const container = document.getElementById('eventsContainer');
            const lang = document.documentElement.getAttribute('data-lang') || 'en';
            const getText = (row, field) => row[`${field}_${lang}`] || row[`${field}_ko`] || row[`${field}_en`] || '';
            try {
                const { data, error } = await sb.from('events').select('*').eq('active', true).order('display_order').order('created_at');
                if (error) throw error;
                if (!data?.length) {
                    const empty = {
                        ko: ['진행중인 이벤트가 없습니다', '새로운 이벤트를 준비 중입니다'],
                        en: ['No ongoing events', 'New events coming soon'],
                        zh: ['暂无进行中的活动', '新活动即将推出']
                    }[lang] || ['No ongoing events', 'New events coming soon'];
                    container.innerHTML = `<div class="events-empty" style="grid-column:1/-1;"><i class="fas fa-calendar-xmark"></i><p>${empty[0]}</p><span>${empty[1]}</span></div>`;
                    return;
                }
                const colorMap = {
                    orange: { bg: '#1a1b23', accent: '#f7931a' },
                    yellow: { bg: '#1e2030', accent: '#fbbf24' },
                    green: { bg: '#0f2e20', accent: '#10b981' },
                    blue: { bg: '#1a2e4a', accent: '#60a5fa' },
                    purple: { bg: '#2e1a4a', accent: '#a78bfa' }
                };
                container.innerHTML = data.map(ev => {
                    const c = colorMap[ev.color_theme] || colorMap.orange;
                    const title = getText(ev, 'title') || '(no title)';
                    const detail = getText(ev, 'detail') || '';
                    const badge = ev.badge || 'Event';
                    const thumb = ev.thumb_url
                        ? `<img src="${escape(ev.thumb_url)}" alt="${escape(title)}" style="width:100%;height:100%;object-fit:cover;display:block;">`
                        : `<svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
                               <rect width="120" height="80" fill="${c.bg}"/>
                               <text x="60" y="32" text-anchor="middle" fill="${c.accent}" font-size="11" font-weight="900" font-family="Inter,sans-serif">${escape(badge.toUpperCase())}</text>
                               <text x="60" y="50" text-anchor="middle" fill="#fff" font-size="12" font-weight="900" font-family="Inter,sans-serif">EVENT</text>
                           </svg>`;
                    const badgeStyle = `background:rgba(255,255,255,0.04); color:${c.accent}; border:1px solid ${c.accent}40;`;
                    return `<a href="${escape(ev.link)}" target="_blank" class="event-grid-card">
                        <div class="event-grid-thumb">${thumb}</div>
                        <div class="event-grid-info">
                            <span class="event-grid-badge" style="${badgeStyle}">${escape(badge)}</span>
                            <p class="event-grid-title">${escape(title)}</p>
                            <span class="event-grid-detail">${escape(detail)}</span>
                        </div>
                    </a>`;
                }).join('');
            } catch (e) {
                container.innerHTML = `<div class="events-empty" style="grid-column:1/-1;"><i class="fas fa-circle-exclamation"></i><p>로드 실패</p><span>${escape(e.message)}</span></div>`;
            }
        }

        loadEvents();
    </script>
</body>
</html>
